default_user = ""
disable_autofill = false

# Add one [[monitors]] block per display.
# Set login = true on the monitor where the login form should appear.
[[monitors]]
name = "HDMI-A-1"
resolution = "1920x1080@60"
position = "0x0"

[[monitors]]
name = "DP-1"
resolution = "2560x1440@144"
position = "1920x0"
login = true

[[sessions]]
name = "Hyprland"
command = "start-hyprland"

[[sessions]]
name = "Sway"
command = "sway"

[[sessions]]
name = "TTY"
command = "/bin/bash"

[input]
kb_layout = "us"
kb_variant = ""
kb_options = ""

[ui]
show_clock = true
clock_format = "%H:%M"
show_date = true
date_format = "%A, %d %B %Y"
title = "hypr-greeter"
field_width = 50
field_spacing = 0
top_spacing = 15
clock_spacing = 0

[ui.colors]
background = "#1a1b26"
foreground = "#c0caf5"
focused = "#f7768e"
error = "#f7768e"

[security]
clear_password_on_error = true
mask_password = true
